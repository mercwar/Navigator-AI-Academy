<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MercWar AI - Atomic Splash</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%;
  height:100%;
  background:#02050c;
  font-family:Segoe UI,Arial,sans-serif;
}

body {
  background: radial-gradient(circle at center,#08172d 0%,#030812 55%,#000 100%);
}

/* Frame container */
#splash-frame {
  position: relative;
  width: 100%;
  height: 300px;        /* fixed height for banner frame */
  overflow: hidden;     /* keep splash inside */
  border-bottom: 1px solid rgba(0,200,255,0.4);
}

/* Stars only inside frame */
#stars {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: .8;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle { from{opacity:.2;} to{opacity:1; transform:scale(2);} }

/* Splash centered inside frame */
#splash {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Atom Frame */
.atom { position: relative; width:220px; height:220px; perspective:1000px; }

/* Nucleus */
.nucleus {
  position:absolute; left:50%; top:50%;
  width:40px; height:40px; margin:-20px 0 0 -20px;
  border-radius:50%;
  background: radial-gradient(circle,#fff 0%,#73d4ff 20%,#00a2ff 55%,#003d88 100%);
  box-shadow:0 0 10px #00bfff,0 0 30px #00bfff,0 0 60px cyan;
  animation:pulse 2s infinite ease-in-out;
}
@keyframes pulse {0%,100%{transform:scale(.9);}50%{transform:scale(1.1);}}

/* Orbit Rings scaled down */
.orbit {
  position:absolute; left:50%; top:50%;
  width:160px; height:60px; margin:-30px 0 0 -80px;
  border:2px solid rgba(0,220,255,.35);
  border-radius:50%; transform-style:preserve-3d;
}
.orbit1{animation:spin1 6s linear infinite;}
.orbit2{animation:spin2 8s linear infinite;}
.orbit3{animation:spin3 7s linear infinite;}
.orbit4{animation:spin4 9s linear infinite;}
@keyframes spin1{from{transform:rotateX(45deg) rotateY(15deg) rotateZ(0);}to{transform:rotateX(45deg) rotateY(15deg) rotateZ(360deg);}}
@keyframes spin2{from{transform:rotateX(65deg) rotateY(45deg) rotateZ(0);}to{transform:rotateX(65deg) rotateY(45deg) rotateZ(360deg);}}
@keyframes spin3{from{transform:rotateX(65deg) rotateY(-45deg) rotateZ(0);}to{transform:rotateX(65deg) rotateY(-45deg) rotateZ(360deg);}}
@keyframes spin4{from{transform:rotateX(85deg) rotateY(90deg) rotateZ(0);}to{transform:rotateX(85deg) rotateY(90deg) rotateZ(360deg);}}

/* Electron */
.electron {
  position:absolute; width:8px; height:8px; border-radius:50%;
  background:#00ffff; box-shadow:0 0 5px cyan,0 0 15px cyan,0 0 30px #00ffff;
  margin:-4px 0 0 -4px;
}

/* Title/Footer inside frame */
.title, .footer { position:absolute; width:100%; text-align:center; }
.title { bottom:40px; }
.footer { bottom:10px; font-size:12px; color:#4fc3ff; }
.title h1 { color:white; font-size:28px; text-shadow:0 0 10px cyan; }
.title h2 { color:#79d8ff; font-size:16px; margin-top:5px; }
</style>
</head>
<body>

<div id="splash-frame">
  <div id="stars"></div>
  <div id="splash">
    <div class="atom">
      <div class="nucleus"></div>
      <div class="orbit orbit1"><div class="electron" style="left:0%;top:50%;"></div><div class="electron" style="left:100%;top:50%;"></div></div>
      <div class="orbit orbit2"><div class="electron" style="left:0%;top:50%;"></div><div class="electron" style="left:100%;top:50%;"></div></div>
      <div class="orbit orbit3"><div class="electron" style="left:0%;top:50%;"></div><div class="electron" style="left:100%;top:50%;"></div></div>
      <div class="orbit orbit4"><div class="electron" style="left:0%;top:50%;"></div><div class="electron" style="left:100%;top:50%;"></div></div>
    </div>
  </div>
  <div class="title">
    <h1>MERCWAR AI</h1>
    <h2>ATOMIC CORE INITIALIZATION</h2>
  </div>
  <div class="footer">Initializing Neural Systems • Loading Constellation • Connecting AI Matrix</div>
</div>

<!-- Other page frames/tags go here -->
<div id="mainContent">
  <p>This is your normal content area below the splash frame.</p>
</div>

<script>
const stars=document.getElementById("stars");
for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDelay=Math.random()*4+"s";
  stars.appendChild(s);
}
</script>
</body>
</html>
